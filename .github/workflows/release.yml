name: Release

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Set version
        id: version
        run: |
          echo "tag=$(date -u +'%Y%m%d.%H%M%S')" >> "$GITHUB_OUTPUT"
          echo "display=$(cat VERSION | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"

      - name: Verify Sparkle public key
        env:
          SPARKLE_EDDSA_PUBLIC_KEY: ${{ secrets.SPARKLE_EDDSA_PUBLIC_KEY }}
        run: |
          # Out-of-band verification: the committed docs/sparkle-public-key.txt
          # must agree with the GitHub secret. If they diverge, either the
          # secret was rotated without committing the new public key, or the
          # committed file is stale — either way we refuse to ship.
          KEY_FILE="docs/sparkle-public-key.txt"
          if [ ! -f "$KEY_FILE" ]; then
            echo "::error::missing $KEY_FILE — commit the Sparkle EdDSA public key"
            exit 1
          fi

          # Strip comment lines and blank lines, then trim whitespace.
          COMMITTED=$(grep -v '^[[:space:]]*#' "$KEY_FILE" | tr -d '[:space:]')
          SECRET=$(printf '%s' "$SPARKLE_EDDSA_PUBLIC_KEY" | tr -d '[:space:]')

          if [ -z "$COMMITTED" ]; then
            echo "::error::$KEY_FILE contains no key (only comments?). Paste the real EdDSA public key."
            exit 1
          fi
          if [ -z "$SECRET" ]; then
            echo "::error::secrets.SPARKLE_EDDSA_PUBLIC_KEY is empty"
            exit 1
          fi

          if [ "$COMMITTED" != "$SECRET" ]; then
            echo "::error::Sparkle public key drift: secrets.SPARKLE_EDDSA_PUBLIC_KEY does not match $KEY_FILE"
            echo "Either update the GitHub secret to match the committed key, or commit a new key file."
            exit 1
          fi

          echo "Sparkle public key matches committed value."

      - name: Import signing certificate
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"

          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERT_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Build release binaries (universal)
        run: |
          # Build per-arch then lipo. SwiftPM's multi-arch single-invocation
          # has historically choked on some dependencies (Sparkle xcframework,
          # mixed binary deps); per-arch + lipo is the boring reliable path.
          swift build -c release --arch arm64
          ARM_BIN_PATH=$(swift build -c release --arch arm64 --show-bin-path)
          cp "$ARM_BIN_PATH/Cicero" "$RUNNER_TEMP/Cicero.arm64"
          cp "$ARM_BIN_PATH/CiceroMCP" "$RUNNER_TEMP/CiceroMCP.arm64"

          swift build -c release --arch x86_64
          X86_BIN_PATH=$(swift build -c release --arch x86_64 --show-bin-path)
          cp "$X86_BIN_PATH/Cicero" "$RUNNER_TEMP/Cicero.x86_64"
          cp "$X86_BIN_PATH/CiceroMCP" "$RUNNER_TEMP/CiceroMCP.x86_64"

          mkdir -p "$RUNNER_TEMP/universal"
          lipo -create "$RUNNER_TEMP/Cicero.arm64" "$RUNNER_TEMP/Cicero.x86_64" \
            -output "$RUNNER_TEMP/universal/Cicero"
          lipo -create "$RUNNER_TEMP/CiceroMCP.arm64" "$RUNNER_TEMP/CiceroMCP.x86_64" \
            -output "$RUNNER_TEMP/universal/CiceroMCP"

          # Sanity-check both archs are present in each binary.
          lipo -info "$RUNNER_TEMP/universal/Cicero"
          lipo -info "$RUNNER_TEMP/universal/CiceroMCP"

          # Reference path for downstream steps. Use the arm64 build dir for
          # framework copy (Sparkle.framework is itself fat).
          echo "UNIVERSAL_BIN=$RUNNER_TEMP/universal" >> "$GITHUB_ENV"
          echo "FRAMEWORK_BIN_PATH=$ARM_BIN_PATH" >> "$GITHUB_ENV"

      - name: Create .app bundle
        run: |
          APP="Cicero.app"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp "$UNIVERSAL_BIN/Cicero" "$APP/Contents/MacOS/Cicero"
          cp "$UNIVERSAL_BIN/CiceroMCP" "$APP/Contents/MacOS/CiceroMCP"
          install_name_tool -add_rpath @loader_path/../Frameworks "$APP/Contents/MacOS/Cicero"
          cp Sources/Cicero/Resources/AppIcon.icns "$APP/Contents/Resources/AppIcon.icns"
          cat > "$APP/Contents/Info.plist" << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key>
            <string>Cicero</string>
            <key>CFBundleDisplayName</key>
            <string>Cicero</string>
            <key>CFBundleIdentifier</key>
            <string>com.andreinicolas.Cicero</string>
            <key>CFBundleVersion</key>
            <string>${{ steps.version.outputs.tag }}</string>
            <key>CFBundleShortVersionString</key>
            <string>${{ steps.version.outputs.display }}</string>
            <key>CFBundleExecutable</key>
            <string>Cicero</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleIconFile</key>
            <string>AppIcon</string>
            <key>LSMinimumSystemVersion</key>
            <string>14.0</string>
            <key>NSHighResolutionCapable</key>
            <true/>
            <key>SUFeedURL</key>
            <string>https://cicero.nicolaeandrei.com/appcast.xml</string>
            <key>SUPublicEDKey</key>
            <string>${{ secrets.SPARKLE_EDDSA_PUBLIC_KEY }}</string>
            <key>SUEnableAutomaticChecks</key>
            <true/>
          </dict>
          </plist>
          PLIST

      - name: Embed Sparkle framework
        run: |
          # Sparkle ships as a fat xcframework; either per-arch build dir has
          # the same Sparkle.framework, so we just pick the arm64 one.
          mkdir -p Cicero.app/Contents/Frameworks
          cp -R "$FRAMEWORK_BIN_PATH/Sparkle.framework" Cicero.app/Contents/Frameworks/

      - name: Codesign
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          IDENTITY=$(security find-identity -v -p codesigning | grep "Developer ID Application" | head -1 | sed 's/.*"\(.*\)".*/\1/')
          ENTITLEMENTS="Cicero.entitlements"

          # Sign all nested code (XPC services, dylibs, frameworks) deepest-first
          find Cicero.app/Contents \( -name "*.xpc" -o -name "*.dylib" -o -name "*.framework" \) -print0 | \
            sort -rz | while IFS= read -r -d '' item; do
            codesign --force --sign "$IDENTITY" --options runtime --timestamp "$item"
          done

          # Sign the bundled CiceroMCP helper executable explicitly. --deep
          # on the outer bundle is deprecated and unreliable for nested
          # Mach-O binaries that aren't XPC/dylib/framework. We give it the
          # same hardened-runtime + entitlements as the host app so it
          # inherits the notarization ticket cleanly.
          codesign --force --sign "$IDENTITY" \
            --options runtime \
            --entitlements "$ENTITLEMENTS" \
            --timestamp \
            Cicero.app/Contents/MacOS/CiceroMCP

          # Sign the main app
          codesign --force --sign "$IDENTITY" \
            --options runtime \
            --entitlements "$ENTITLEMENTS" \
            --timestamp \
            --deep \
            Cicero.app

      - name: Verify codesign
        run: codesign -dvv Cicero.app

      - name: Package for notarization
        run: ditto -c -k --sequesterRsrc --keepParent Cicero.app Cicero.zip

      - name: Notarize
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          RESULT=$(xcrun notarytool submit Cicero.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait 2>&1)
          echo "$RESULT"

          ID=$(echo "$RESULT" | grep "id:" | head -1 | awk '{print $2}')
          STATUS=$(echo "$RESULT" | grep "status:" | tail -1 | awk '{print $2}')

          if [ "$STATUS" != "Accepted" ]; then
            echo "Notarization failed with status: $STATUS"
            echo "Fetching notarization log..."
            xcrun notarytool log "$ID" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_ID_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" || true
            exit 1
          fi

      - name: Wait for ticket propagation
        run: |
          echo "Waiting 60s for Apple notarization ticket to propagate..."
          sleep 60

      - name: Staple
        run: |
          for i in $(seq 1 5); do
            if xcrun stapler staple Cicero.app; then
              exit 0
            fi
            echo "Staple attempt $i failed, waiting 30s..."
            sleep 30
          done
          echo "::error::Stapling failed after 5 attempts — refusing to ship unstapled build"
          exit 1

      - name: Re-package
        run: |
          rm Cicero.zip
          ditto -c -k --sequesterRsrc --keepParent Cicero.app Cicero.zip

      - name: Compute SHA256
        id: sha
        run: echo "sha256=$(shasum -a 256 Cicero.zip | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Compute file size
        id: filesize
        run: echo "size=$(stat -f%z Cicero.zip)" >> "$GITHUB_OUTPUT"

      - name: Generate Sparkle signature
        id: sparkle
        env:
          SPARKLE_EDDSA_PRIVATE_KEY: ${{ secrets.SPARKLE_EDDSA_PRIVATE_KEY }}
        run: |
          SPARKLE_VERSION="2.6.0"
          curl -sL "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz" -o "$RUNNER_TEMP/sparkle.tar.xz"
          mkdir -p "$RUNNER_TEMP/sparkle"
          tar -xf "$RUNNER_TEMP/sparkle.tar.xz" -C "$RUNNER_TEMP/sparkle"
          KEY_FILE="$RUNNER_TEMP/sparkle_ed_key"
          echo "$SPARKLE_EDDSA_PRIVATE_KEY" > "$KEY_FILE"
          SIGN_OUTPUT=$("$RUNNER_TEMP/sparkle/bin/sign_update" Cicero.zip --ed-key-file "$KEY_FILE")
          rm -f "$KEY_FILE"
          ED_SIGNATURE=$(echo "$SIGN_OUTPUT" | sed -n 's/.*sparkle:edSignature="\([^"]*\)".*/\1/p')
          echo "signature=$ED_SIGNATURE" >> "$GITHUB_OUTPUT"

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.version.outputs.tag }}"
          FULL_SHA="${{ github.sha }}"
          SHORT_SHA=$(echo "$FULL_SHA" | cut -c1-7)
          gh release create "$TAG" \
            --title "Cicero ${TAG}" \
            --notes "Automated build from main (${SHORT_SHA}). Signed and notarized." \
            --target "${FULL_SHA}" \
            Cicero.zip

      - name: Update Homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          TAG="v${{ steps.version.outputs.tag }}"
          SHA256="${{ steps.sha.outputs.sha256 }}"
          URL="https://github.com/nclandrei/cicero/releases/download/${TAG}/Cicero.zip"

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/nclandrei/homebrew-tap.git" "$RUNNER_TEMP/homebrew-tap"

          CASK_FILE="$RUNNER_TEMP/homebrew-tap/Casks/cicero.rb"
          {
            echo "cask \"cicero\" do"
            echo "  version \"${TAG#v}\""
            echo "  sha256 \"${SHA256}\""
            echo ""
            echo "  url \"${URL}\""
            echo "  name \"Cicero\""
            echo "  desc \"AI-native macOS presentation app for developers\""
            echo "  homepage \"https://github.com/nclandrei/cicero\""
            echo ""
            echo "  depends_on macos: \">= :sonoma\""
            echo ""
            echo "  app \"Cicero.app\""
            echo "  binary \"#{appdir}/Cicero.app/Contents/MacOS/CiceroMCP\", target: \"cicero-mcp\""
            echo ""
            echo "  zap trash: ["
            echo "    \"~/Library/Preferences/com.andreinicolas.Cicero.plist\","
            echo "  ]"
            echo "end"
          } > "$CASK_FILE"

          cd "$RUNNER_TEMP/homebrew-tap"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/cicero.rb
          git commit -m "Update cicero to ${TAG}"
          git push

      - name: Update appcast.xml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.tag }}"
          SIZE="${{ steps.filesize.outputs.size }}"
          URL="https://github.com/nclandrei/cicero/releases/download/${TAG}/Cicero.zip"
          SIGNATURE="${{ steps.sparkle.outputs.signature }}"
          PUB_DATE=$(date -u +"%a, %d %b %Y %H:%M:%S %z")

          python3 -c "
          import sys
          item = '''    <item>
              <title>Cicero $TAG</title>
              <pubDate>$PUB_DATE</pubDate>
              <sparkle:version>$VERSION</sparkle:version>
              <sparkle:shortVersionString>${{ steps.version.outputs.display }}</sparkle:shortVersionString>
              <enclosure
                url=\"$URL\"
                length=\"$SIZE\"
                type=\"application/octet-stream\"
                sparkle:edSignature=\"$SIGNATURE\"
              />
            </item>
          '''
          with open('docs/appcast.xml', 'r') as f:
              content = f.read()
          content = content.replace('</channel>', item + '  </channel>')
          with open('docs/appcast.xml', 'w') as f:
              f.write(content)
          "

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/appcast.xml
          git commit -m "Update appcast.xml for ${TAG}"
          git push origin HEAD:main

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain "$RUNNER_TEMP/signing.keychain-db" || true
