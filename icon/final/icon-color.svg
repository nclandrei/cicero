<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Background gradient: deep indigo to midnight blue -->
    <linearGradient id="bg-gradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1147"/>
      <stop offset="100%" stop-color="#0d1b3e"/>
    </linearGradient>

    <!-- Gold gradient for column body -->
    <linearGradient id="gold-gradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b8892e"/>
      <stop offset="20%" stop-color="#f0d78c"/>
      <stop offset="50%" stop-color="#d4a84b"/>
      <stop offset="80%" stop-color="#f0d78c"/>
      <stop offset="100%" stop-color="#b8892e"/>
    </linearGradient>

    <!-- Light gold for highlights -->
    <linearGradient id="gold-highlight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0d78c"/>
      <stop offset="100%" stop-color="#d4a84b"/>
    </linearGradient>

    <!-- Dark gold for shadows -->
    <linearGradient id="gold-shadow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4a84b"/>
      <stop offset="100%" stop-color="#9a7030"/>
    </linearGradient>

    <!-- Capital (top ornament) gradient -->
    <linearGradient id="capital-gradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5e2a0"/>
      <stop offset="50%" stop-color="#d4a84b"/>
      <stop offset="100%" stop-color="#b8892e"/>
    </linearGradient>

    <!-- Base gradient -->
    <linearGradient id="base-gradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4a84b"/>
      <stop offset="100%" stop-color="#9a7030"/>
    </linearGradient>

    <!-- Slide screen glow -->
    <radialGradient id="slide-glow" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0%" stop-color="#2a2070" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0d1b3e" stop-opacity="0"/>
    </radialGradient>

    <!-- Slide content gradient -->
    <linearGradient id="slide-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1555"/>
      <stop offset="100%" stop-color="#151040"/>
    </linearGradient>

    <!-- Inner shadow filter -->
    <filter id="drop-shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.4"/>
    </filter>

    <!-- Soft glow filter -->
    <filter id="soft-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Ambient light from top -->
    <linearGradient id="ambient-light" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- Column fluting highlight -->
    <linearGradient id="flute-light" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- Column fluting shadow -->
    <linearGradient id="flute-shadow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="40%" stop-color="#000000" stop-opacity="0.2"/>
      <stop offset="60%" stop-color="#000000" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>
    <!-- macOS squircle clip path (~22% corner radius) -->
    <clipPath id="squircle">
      <rect width="1024" height="1024" rx="224" ry="224"/>
    </clipPath>
  </defs>

  <g clip-path="url(#squircle)">

  <!-- Background -->
  <g id="background">
    <rect width="1024" height="1024" fill="url(#bg-gradient)"/>
    <!-- Subtle radial highlight at center-top -->
    <ellipse cx="512" cy="300" rx="500" ry="400" fill="url(#ambient-light)"/>
  </g>

  <!-- Content group — shifted down 15px to vertically center after text removal -->
  <g id="content" transform="translate(0, 15)">

  <!-- Presentation slide (behind column, embedded in column shape) -->
  <g id="slide" filter="url(#drop-shadow)">
    <!-- Slide outline/frame — shaped like a widescreen slide -->
    <rect x="282" y="220" width="460" height="310" rx="12" ry="12" fill="url(#slide-bg)" stroke="#d4a84b" stroke-width="3" stroke-opacity="0.5"/>
    <!-- Slide inner glow -->
    <rect x="282" y="220" width="460" height="310" rx="12" ry="12" fill="url(#slide-glow)"/>

    <!-- Slide content lines (abstract text representation) -->
    <g id="slide-content" opacity="0.6">
      <!-- Title line -->
      <rect x="330" y="270" width="200" height="12" rx="6" fill="#f0d78c" opacity="0.7"/>
      <!-- Body lines -->
      <rect x="330" y="310" width="360" height="8" rx="4" fill="#f0d78c" opacity="0.3"/>
      <rect x="330" y="332" width="320" height="8" rx="4" fill="#f0d78c" opacity="0.25"/>
      <rect x="330" y="354" width="340" height="8" rx="4" fill="#f0d78c" opacity="0.2"/>
      <!-- Bullet points -->
      <circle cx="318" cy="314" r="3" fill="#d4a84b" opacity="0.4"/>
      <circle cx="318" cy="336" r="3" fill="#d4a84b" opacity="0.35"/>
      <circle cx="318" cy="358" r="3" fill="#d4a84b" opacity="0.3"/>
    </g>

    <!-- Small play/present triangle in bottom-right of slide -->
    <polygon points="690,500 690,480 710,490" fill="#d4a84b" opacity="0.4"/>
  </g>

  <!-- Column structure -->
  <g id="column" filter="url(#drop-shadow)">

    <!-- Column base (bottom) — two-tiered plinth -->
    <g id="column-base">
      <!-- Bottom tier -->
      <rect x="312" y="830" width="400" height="40" rx="4" fill="url(#base-gradient)"/>
      <!-- Bottom tier bevel top -->
      <rect x="312" y="830" width="400" height="6" rx="2" fill="#f0d78c" opacity="0.4"/>

      <!-- Upper tier -->
      <rect x="342" y="790" width="340" height="45" rx="4" fill="url(#base-gradient)"/>
      <!-- Upper tier top bevel -->
      <rect x="342" y="790" width="340" height="5" rx="2" fill="#f0d78c" opacity="0.3"/>

      <!-- Torus molding between base and shaft -->
      <ellipse cx="512" cy="790" rx="155" ry="12" fill="url(#gold-shadow)"/>
      <ellipse cx="512" cy="786" rx="155" ry="10" fill="url(#gold-highlight)"/>
    </g>

    <!-- Column shaft — with entasis (slight taper) -->
    <g id="column-shaft">
      <!-- Main shaft body -->
      <polygon points="372,540 372,782 652,782 652,540" fill="url(#gold-gradient)"/>
      <!-- Slight taper at top (shaft narrows) -->
      <polygon points="382,540 372,782 652,782 642,540" fill="url(#gold-gradient)"/>

      <!-- Fluting (vertical grooves) — classical detail -->
      <rect x="400" y="544" width="16" height="234" rx="8" fill="url(#flute-shadow)"/>
      <rect x="432" y="544" width="16" height="234" rx="8" fill="url(#flute-light)"/>
      <rect x="464" y="544" width="16" height="234" rx="8" fill="url(#flute-shadow)"/>
      <rect x="496" y="544" width="16" height="234" rx="8" fill="url(#flute-light)"/>
      <rect x="528" y="544" width="16" height="234" rx="8" fill="url(#flute-shadow)"/>
      <rect x="560" y="544" width="16" height="234" rx="8" fill="url(#flute-light)"/>
      <rect x="592" y="544" width="16" height="234" rx="8" fill="url(#flute-shadow)"/>
      <rect x="624" y="544" width="16" height="234" rx="8" fill="url(#flute-light)"/>

      <!-- Shaft highlight (left side light catch) -->
      <rect x="382" y="540" width="60" height="242" fill="#ffffff" opacity="0.06" rx="4"/>
    </g>

    <!-- Capital (top of column) — Ionic-inspired with volutes -->
    <g id="column-capital">
      <!-- Abacus (flat top slab) -->
      <rect x="322" y="187" width="380" height="36" rx="4" fill="url(#capital-gradient)"/>
      <!-- Abacus top bevel -->
      <rect x="322" y="187" width="380" height="6" rx="2" fill="#f5e2a0" opacity="0.5"/>

      <!-- Echinus (curved transition) -->
      <ellipse cx="512" cy="227" rx="175" ry="14" fill="url(#gold-shadow)"/>
      <ellipse cx="512" cy="224" rx="175" ry="12" fill="url(#gold-highlight)"/>

      <!-- Left volute (scroll) — simplified geometric -->
      <circle cx="342" cy="230" r="28" fill="none" stroke="#d4a84b" stroke-width="6"/>
      <circle cx="342" cy="230" r="16" fill="url(#capital-gradient)"/>
      <circle cx="342" cy="230" r="8" fill="#b8892e"/>

      <!-- Right volute (scroll) — simplified geometric -->
      <circle cx="682" cy="230" r="28" fill="none" stroke="#d4a84b" stroke-width="6"/>
      <circle cx="682" cy="230" r="16" fill="url(#capital-gradient)"/>
      <circle cx="682" cy="230" r="8" fill="#b8892e"/>

      <!-- Connecting band between volutes -->
      <rect x="370" y="224" width="284" height="12" rx="2" fill="url(#gold-gradient)"/>

      <!-- Neck molding -->
      <ellipse cx="512" cy="244" rx="140" ry="8" fill="url(#gold-shadow)"/>

      <!-- Necking (transition to shaft) -->
      <rect x="378" y="244" width="268" height="16" rx="2" fill="url(#gold-gradient)"/>

      <!-- Astragal (small bead molding at shaft top) -->
      <ellipse cx="512" cy="262" rx="138" ry="6" fill="url(#gold-highlight)"/>
    </g>

    <!-- Decorative band at top of shaft (where shaft meets capital) -->
    <rect x="380" y="530" width="264" height="14" rx="3" fill="url(#gold-highlight)" opacity="0.5"/>
  </g>

  <!-- Laurel wreath accent — simplified geometric leaves around slide area -->
  <g id="laurel-accent" opacity="0.25">
    <!-- Left laurel branch -->
    <ellipse cx="260" cy="350" rx="8" ry="22" fill="#d4a84b" transform="rotate(-20, 260, 350)"/>
    <ellipse cx="252" cy="310" rx="7" ry="20" fill="#d4a84b" transform="rotate(-30, 252, 310)"/>
    <ellipse cx="248" cy="270" rx="6" ry="18" fill="#d4a84b" transform="rotate(-40, 248, 270)"/>
    <ellipse cx="250" cy="390" rx="8" ry="22" fill="#d4a84b" transform="rotate(-10, 250, 390)"/>
    <ellipse cx="245" cy="430" rx="7" ry="20" fill="#d4a84b" transform="rotate(5, 245, 430)"/>

    <!-- Right laurel branch -->
    <ellipse cx="764" cy="350" rx="8" ry="22" fill="#d4a84b" transform="rotate(20, 764, 350)"/>
    <ellipse cx="772" cy="310" rx="7" ry="20" fill="#d4a84b" transform="rotate(30, 772, 310)"/>
    <ellipse cx="776" cy="270" rx="6" ry="18" fill="#d4a84b" transform="rotate(40, 776, 270)"/>
    <ellipse cx="774" cy="390" rx="8" ry="22" fill="#d4a84b" transform="rotate(10, 774, 390)"/>
    <ellipse cx="779" cy="430" rx="7" ry="20" fill="#d4a84b" transform="rotate(-5, 779, 430)"/>
  </g>

  </g><!-- end content group -->

  <!-- Top ambient light overlay for depth -->
  <rect x="0" y="0" width="1024" height="300" fill="url(#ambient-light)" opacity="0.5"/>

  </g><!-- end squircle clip -->
</svg>