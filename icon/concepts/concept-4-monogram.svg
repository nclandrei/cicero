<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Background gradient: rich purple to deep violet -->
    <linearGradient id="bg-gradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5a2380"/>
      <stop offset="40%" stop-color="#4a1a6b"/>
      <stop offset="100%" stop-color="#1f0a3d"/>
    </linearGradient>

    <!-- Subtle inner glow for depth -->
    <radialGradient id="inner-glow" cx="0.45" cy="0.4" r="0.6">
      <stop offset="0%" stop-color="#6b2fa0" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#1f0a3d" stop-opacity="0"/>
    </radialGradient>

    <!-- Letter gradient: warm cream with subtle warmth variation -->
    <linearGradient id="letter-gradient" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#faf4e8"/>
      <stop offset="50%" stop-color="#f5ecd7"/>
      <stop offset="100%" stop-color="#e8dcc4"/>
    </linearGradient>

    <!-- Gold accent gradient -->
    <linearGradient id="gold-gradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4b35a"/>
      <stop offset="50%" stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#a8893a"/>
    </linearGradient>

    <!-- Gold accent gradient for top elements -->
    <linearGradient id="gold-gradient-top" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#d4b35a"/>
    </linearGradient>

    <!-- Drop shadow for the letter -->
    <filter id="letter-shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#0d0520" flood-opacity="0.6"/>
    </filter>

    <!-- Subtle outer glow for gold accents -->
    <filter id="gold-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#c9a84c" flood-opacity="0.3"/>
    </filter>

    <!-- Very subtle shadow for frame lines -->
    <filter id="line-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#0d0520" flood-opacity="0.3"/>
    </filter>

    <!-- Vignette mask for background depth -->
    <radialGradient id="vignette" cx="0.5" cy="0.5" r="0.7">
      <stop offset="0%" stop-color="white" stop-opacity="1"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.5"/>
    </radialGradient>
    <mask id="vignette-mask">
      <rect width="1024" height="1024" fill="url(#vignette)"/>
    </mask>
  </defs>

  <!-- Background -->
  <g id="background">
    <!-- Base gradient fill -->
    <rect width="1024" height="1024" fill="url(#bg-gradient)"/>
    <!-- Inner glow for depth -->
    <rect width="1024" height="1024" fill="url(#inner-glow)"/>
    <!-- Subtle texture: very faint noise-like pattern via tiny shapes -->
    <rect width="1024" height="1024" fill="#2a1045" opacity="0.08" mask="url(#vignette-mask)"/>
  </g>

  <!-- Presentation frame / slide boundary accents -->
  <g id="frame-accents" filter="url(#line-shadow)">
    <!-- Corner brackets — top left -->
    <line x1="140" y1="140" x2="220" y2="140" stroke="url(#gold-gradient)" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
    <line x1="140" y1="140" x2="140" y2="220" stroke="url(#gold-gradient)" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>

    <!-- Corner brackets — top right -->
    <line x1="884" y1="140" x2="804" y2="140" stroke="url(#gold-gradient)" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
    <line x1="884" y1="140" x2="884" y2="220" stroke="url(#gold-gradient)" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>

    <!-- Corner brackets — bottom left -->
    <line x1="140" y1="884" x2="220" y2="884" stroke="url(#gold-gradient)" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
    <line x1="140" y1="884" x2="140" y2="804" stroke="url(#gold-gradient)" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>

    <!-- Corner brackets — bottom right -->
    <line x1="884" y1="884" x2="804" y2="884" stroke="url(#gold-gradient)" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
    <line x1="884" y1="884" x2="884" y2="804" stroke="url(#gold-gradient)" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>

    <!-- Corner dots -->
    <circle cx="140" cy="140" r="4" fill="url(#gold-gradient)" opacity="0.8"/>
    <circle cx="884" cy="140" r="4" fill="url(#gold-gradient)" opacity="0.8"/>
    <circle cx="140" cy="884" r="4" fill="url(#gold-gradient)" opacity="0.8"/>
    <circle cx="884" cy="884" r="4" fill="url(#gold-gradient)" opacity="0.8"/>
  </g>

  <!-- Thin geometric ring behind the letter for depth -->
  <g id="geometric-ring">
    <circle cx="512" cy="500" r="310" fill="none" stroke="#c9a84c" stroke-width="1" opacity="0.15"/>
    <circle cx="512" cy="500" r="340" fill="none" stroke="#c9a84c" stroke-width="0.5" opacity="0.1"/>
  </g>

  <!-- Decorative horizontal rules flanking the letter -->
  <g id="horizontal-rules" filter="url(#gold-glow)">
    <!-- Left rule -->
    <line x1="220" y1="500" x2="320" y2="500" stroke="url(#gold-gradient)" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <circle cx="220" cy="500" r="2.5" fill="#c9a84c" opacity="0.6"/>

    <!-- Right rule -->
    <line x1="704" y1="500" x2="804" y2="500" stroke="url(#gold-gradient)" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <circle cx="804" cy="500" r="2.5" fill="#c9a84c" opacity="0.6"/>
  </g>

  <!-- Small decorative dots above and below -->
  <g id="vertical-dots" opacity="0.4">
    <circle cx="512" cy="220" r="3" fill="#c9a84c"/>
    <circle cx="512" cy="240" r="2" fill="#c9a84c" opacity="0.6"/>
    <circle cx="512" cy="770" r="3" fill="#c9a84c"/>
    <circle cx="512" cy="750" r="2" fill="#c9a84c" opacity="0.6"/>
  </g>

  <!-- Main letter C -->
  <g id="letter-c" filter="url(#letter-shadow)">
    <text
      x="512"
      y="560"
      text-anchor="middle"
      dominant-baseline="central"
      font-family="Georgia, 'Times New Roman', serif"
      font-size="520"
      font-weight="bold"
      font-style="normal"
      fill="url(#letter-gradient)"
      letter-spacing="-10"
    >C</text>
  </g>

  <!-- Subtle gold underline beneath the C -->
  <g id="letter-underline" filter="url(#gold-glow)">
    <line x1="370" y1="740" x2="654" y2="740" stroke="url(#gold-gradient)" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
    <!-- Small diamond at center of underline -->
    <polygon points="512,732 520,740 512,748 504,740" fill="#c9a84c" opacity="0.7"/>
  </g>

  <!-- Brand name below -->
  <g id="brand-name">
    <text
      x="512"
      y="850"
      text-anchor="middle"
      font-family="Georgia, 'Times New Roman', serif"
      font-size="56"
      font-weight="normal"
      letter-spacing="18"
      fill="#c9a84c"
      opacity="0.75"
    >CICERO</text>
    <!-- Thin lines flanking the brand name -->
    <line x1="280" y1="850" x2="360" y2="850" stroke="#c9a84c" stroke-width="1" stroke-linecap="round" opacity="0.35"/>
    <line x1="664" y1="850" x2="744" y2="850" stroke="#c9a84c" stroke-width="1" stroke-linecap="round" opacity="0.35"/>
  </g>
</svg>