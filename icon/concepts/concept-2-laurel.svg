<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Background gradient: burgundy to deep wine -->
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6b1d3a"/>
      <stop offset="100%" stop-color="#3d0f22"/>
    </linearGradient>

    <!-- Radial glow behind the center -->
    <radialGradient id="center-glow" cx="0.5" cy="0.5" r="0.35">
      <stop offset="0%" stop-color="#8a2a4e" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#3d0f22" stop-opacity="0"/>
    </radialGradient>

    <!-- Silver gradient for wreath leaves -->
    <linearGradient id="leaf-silver" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#e8edf2"/>
      <stop offset="50%" stop-color="#c0c7d0"/>
      <stop offset="100%" stop-color="#8a9199"/>
    </linearGradient>

    <!-- Brighter silver for highlight leaves -->
    <linearGradient id="leaf-highlight" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#f0f3f7"/>
      <stop offset="40%" stop-color="#d5dbe3"/>
      <stop offset="100%" stop-color="#a0a9b3"/>
    </linearGradient>

    <!-- Gold gradient for play icon -->
    <linearGradient id="gold-grad" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#e8c46a"/>
      <stop offset="50%" stop-color="#d4a84b"/>
      <stop offset="100%" stop-color="#b8862e"/>
    </linearGradient>

    <!-- Gold glow for play icon -->
    <radialGradient id="gold-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#d4a84b" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#d4a84b" stop-opacity="0"/>
    </radialGradient>

    <!-- Stem gradient -->
    <linearGradient id="stem-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8a9199"/>
      <stop offset="50%" stop-color="#c0c7d0"/>
      <stop offset="100%" stop-color="#8a9199"/>
    </linearGradient>

    <!-- Inner shadow for depth -->
    <radialGradient id="inner-shadow" cx="0.5" cy="0.5" r="0.55">
      <stop offset="70%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.35"/>
    </radialGradient>

    <!-- Squircle clip for macOS icon shape -->
    <clipPath id="squircle-clip">
      <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224"/>
    </clipPath>

    <!-- Drop shadow filter for the wreath -->
    <filter id="wreath-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1a0610" flood-opacity="0.5"/>
    </filter>

    <!-- Glow filter for play icon -->
    <filter id="play-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="12" result="blur"/>
      <feFlood flood-color="#d4a84b" flood-opacity="0.35" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle inner light on background -->
    <filter id="bg-texture" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.015" numOctaves="2" seed="42" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="mono"/>
      <feComponentTransfer in="mono" result="faint">
        <feFuncA type="linear" slope="0.04"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="SourceGraphic"/>
        <feMergeNode in="faint"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Clipped to squircle -->
  <g clip-path="url(#squircle-clip)">

    <!-- Background -->
    <g id="background">
      <rect width="1024" height="1024" fill="url(#bg-grad)" filter="url(#bg-texture)"/>
      <!-- Central radial glow -->
      <rect width="1024" height="1024" fill="url(#center-glow)"/>
    </g>

    <!-- Laurel Wreath -->
    <g id="laurel-wreath" filter="url(#wreath-shadow)">

      <!-- Left branch -->
      <g id="left-branch">
        <!-- Stem — a gentle arc made of short line segments approximating a curve -->
        <path d="M 490 720 Q 340 620 310 420 Q 295 310 340 220"
              stroke="url(#stem-grad)" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.6"/>

        <!-- Leaves along the left stem — diamond/pointed-oval shapes -->
        <!-- Each leaf is a simple polygon (4-point diamond) rotated to follow the stem -->

        <!-- Leaf L1 (bottom, near base) -->
        <g transform="translate(470, 690) rotate(-25)">
          <polygon points="0,-28 10,0 0,28 -10,0" fill="url(#leaf-silver)" opacity="0.85"/>
        </g>
        <!-- Leaf L2 -->
        <g transform="translate(440, 650) rotate(-32)">
          <polygon points="0,-32 11,0 0,32 -11,0" fill="url(#leaf-highlight)" opacity="0.9"/>
        </g>
        <!-- Leaf L3 -->
        <g transform="translate(410, 610) rotate(-40)">
          <polygon points="0,-30 10,0 0,30 -10,0" fill="url(#leaf-silver)" opacity="0.85"/>
        </g>
        <!-- Leaf L4 -->
        <g transform="translate(385, 565) rotate(-48)">
          <polygon points="0,-33 11,0 0,33 -11,0" fill="url(#leaf-highlight)" opacity="0.9"/>
        </g>
        <!-- Leaf L5 -->
        <g transform="translate(360, 520) rotate(-55)">
          <polygon points="0,-30 10,0 0,30 -10,0" fill="url(#leaf-silver)" opacity="0.85"/>
        </g>
        <!-- Leaf L6 -->
        <g transform="translate(340, 472) rotate(-62)">
          <polygon points="0,-33 12,0 0,33 -12,0" fill="url(#leaf-highlight)" opacity="0.9"/>
        </g>
        <!-- Leaf L7 -->
        <g transform="translate(325, 422) rotate(-70)">
          <polygon points="0,-30 10,0 0,30 -10,0" fill="url(#leaf-silver)" opacity="0.85"/>
        </g>
        <!-- Leaf L8 -->
        <g transform="translate(315, 372) rotate(-76)">
          <polygon points="0,-33 11,0 0,33 -11,0" fill="url(#leaf-highlight)" opacity="0.92"/>
        </g>
        <!-- Leaf L9 -->
        <g transform="translate(310, 320) rotate(-82)">
          <polygon points="0,-30 10,0 0,30 -10,0" fill="url(#leaf-silver)" opacity="0.85"/>
        </g>
        <!-- Leaf L10 (top) -->
        <g transform="translate(315, 270) rotate(-86)">
          <polygon points="0,-28 10,0 0,28 -10,0" fill="url(#leaf-highlight)" opacity="0.9"/>
        </g>
        <!-- Leaf L11 (near apex) -->
        <g transform="translate(328, 228) rotate(-78)">
          <polygon points="0,-25 9,0 0,25 -9,0" fill="url(#leaf-silver)" opacity="0.85"/>
        </g>

        <!-- Inner row of smaller leaves (depth layer) -->
        <g opacity="0.55">
          <g transform="translate(455, 668) rotate(-20)">
            <polygon points="0,-20 7,0 0,20 -7,0" fill="#a0a9b3"/>
          </g>
          <g transform="translate(425, 628) rotate(-35)">
            <polygon points="0,-22 7,0 0,22 -7,0" fill="#a0a9b3"/>
          </g>
          <g transform="translate(398, 585) rotate(-44)">
            <polygon points="0,-20 7,0 0,20 -7,0" fill="#a0a9b3"/>
          </g>
          <g transform="translate(372, 540) rotate(-52)">
            <polygon points="0,-22 7,0 0,22 -7,0" fill="#a0a9b3"/>
          </g>
          <g transform="translate(352, 495) rotate(-58)">
            <polygon points="0,-20 7,0 0,20 -7,0" fill="#a0a9b3"/>
          </g>
          <g transform="translate(336, 446) rotate(-66)">
            <polygon points="0,-22 7,0 0,22 -7,0" fill="#a0a9b3"/>
          </g>
          <g transform="translate(325, 396) rotate(-73)">
            <polygon points="0,-20 7,0 0,20 -7,0" fill="#a0a9b3"/>
          </g>
          <g transform="translate(318, 346) rotate(-79)">
            <polygon points="0,-22 7,0 0,22 -7,0" fill="#a0a9b3"/>
          </g>
          <g transform="translate(318, 296) rotate(-84)">
            <polygon points="0,-20 7,0 0,20 -7,0" fill="#a0a9b3"/>
          </g>
        </g>
      </g>

      <!-- Right branch (mirrored) -->
      <g id="right-branch">
        <!-- Stem -->
        <path d="M 534 720 Q 684 620 714 420 Q 729 310 684 220"
              stroke="url(#stem-grad)" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.6"/>

        <!-- Leaves along the right stem -->
        <g transform="translate(554, 690) rotate(25)">
          <polygon points="0,-28 10,0 0,28 -10,0" fill="url(#leaf-silver)" opacity="0.85"/>
        </g>
        <g transform="translate(584, 650) rotate(32)">
          <polygon points="0,-32 11,0 0,32 -11,0" fill="url(#leaf-highlight)" opacity="0.9"/>
        </g>
        <g transform="translate(614, 610) rotate(40)">
          <polygon points="0,-30 10,0 0,30 -10,0" fill="url(#leaf-silver)" opacity="0.85"/>
        </g>
        <g transform="translate(639, 565) rotate(48)">
          <polygon points="0,-33 11,0 0,33 -11,0" fill="url(#leaf-highlight)" opacity="0.9"/>
        </g>
        <g transform="translate(664, 520) rotate(55)">
          <polygon points="0,-30 10,0 0,30 -10,0" fill="url(#leaf-silver)" opacity="0.85"/>
        </g>
        <g transform="translate(684, 472) rotate(62)">
          <polygon points="0,-33 12,0 0,33 -12,0" fill="url(#leaf-highlight)" opacity="0.9"/>
        </g>
        <g transform="translate(699, 422) rotate(70)">
          <polygon points="0,-30 10,0 0,30 -10,0" fill="url(#leaf-silver)" opacity="0.85"/>
        </g>
        <g transform="translate(709, 372) rotate(76)">
          <polygon points="0,-33 11,0 0,33 -11,0" fill="url(#leaf-highlight)" opacity="0.92"/>
        </g>
        <g transform="translate(714, 320) rotate(82)">
          <polygon points="0,-30 10,0 0,30 -10,0" fill="url(#leaf-silver)" opacity="0.85"/>
        </g>
        <g transform="translate(709, 270) rotate(86)">
          <polygon points="0,-28 10,0 0,28 -10,0" fill="url(#leaf-highlight)" opacity="0.9"/>
        </g>
        <g transform="translate(696, 228) rotate(78)">
          <polygon points="0,-25 9,0 0,25 -9,0" fill="url(#leaf-silver)" opacity="0.85"/>
        </g>

        <!-- Inner row of smaller leaves (depth layer) -->
        <g opacity="0.55">
          <g transform="translate(569, 668) rotate(20)">
            <polygon points="0,-20 7,0 0,20 -7,0" fill="#a0a9b3"/>
          </g>
          <g transform="translate(599, 628) rotate(35)">
            <polygon points="0,-22 7,0 0,22 -7,0" fill="#a0a9b3"/>
          </g>
          <g transform="translate(626, 585) rotate(44)">
            <polygon points="0,-20 7,0 0,20 -7,0" fill="#a0a9b3"/>
          </g>
          <g transform="translate(652, 540) rotate(52)">
            <polygon points="0,-22 7,0 0,22 -7,0" fill="#a0a9b3"/>
          </g>
          <g transform="translate(672, 495) rotate(58)">
            <polygon points="0,-20 7,0 0,20 -7,0" fill="#a0a9b3"/>
          </g>
          <g transform="translate(688, 446) rotate(66)">
            <polygon points="0,-22 7,0 0,22 -7,0" fill="#a0a9b3"/>
          </g>
          <g transform="translate(699, 396) rotate(73)">
            <polygon points="0,-20 7,0 0,20 -7,0" fill="#a0a9b3"/>
          </g>
          <g transform="translate(706, 346) rotate(79)">
            <polygon points="0,-22 7,0 0,22 -7,0" fill="#a0a9b3"/>
          </g>
          <g transform="translate(706, 296) rotate(84)">
            <polygon points="0,-20 7,0 0,20 -7,0" fill="#a0a9b3"/>
          </g>
        </g>
      </g>

      <!-- Top apex — two small leaves meeting -->
      <g id="wreath-apex">
        <g transform="translate(496, 205) rotate(-10)">
          <polygon points="0,-22 8,0 0,22 -8,0" fill="url(#leaf-highlight)" opacity="0.9"/>
        </g>
        <g transform="translate(528, 205) rotate(10)">
          <polygon points="0,-22 8,0 0,22 -8,0" fill="url(#leaf-highlight)" opacity="0.9"/>
        </g>
      </g>

      <!-- Ribbon/tie at the base of the wreath -->
      <g id="wreath-ribbon" opacity="0.7">
        <polygon points="502,730 512,760 492,760" fill="url(#leaf-silver)"/>
        <polygon points="522,730 512,760 532,760" fill="url(#leaf-silver)"/>
        <!-- Small crossbar -->
        <rect x="496" y="722" width="32" height="5" rx="2" fill="#c0c7d0" opacity="0.8"/>
      </g>
    </g>

    <!-- Central Play/Presentation Icon -->
    <g id="play-icon" filter="url(#play-glow)">
      <!-- Soft glow circle behind -->
      <circle cx="512" cy="478" r="100" fill="url(#gold-glow)" opacity="0.6"/>

      <!-- Play triangle — geometric, slightly rounded feel via polygon -->
      <!-- Centered in the wreath, pointing right -->
      <polygon points="478,428 478,528 568,478" fill="url(#gold-grad)"/>

      <!-- Highlight edge on the play triangle (top-left bevel) -->
      <polygon points="478,428 478,438 558,478 478,518 478,528 568,478"
               fill="none" stroke="#e8c46a" stroke-width="2" opacity="0.4"/>
    </g>

    <!-- Brand name "CICERO" -->
    <g id="brand-name">
      <!-- Text shadow -->
      <text x="512" y="838" text-anchor="middle"
            font-family="'Georgia', 'Times New Roman', 'Palatino', serif"
            font-size="72" font-weight="bold" letter-spacing="18"
            fill="#1a0610" opacity="0.4"
            transform="translate(0, 3)">CICERO</text>
      <!-- Main text -->
      <text x="512" y="838" text-anchor="middle"
            font-family="'Georgia', 'Times New Roman', 'Palatino', serif"
            font-size="72" font-weight="bold" letter-spacing="18"
            fill="url(#leaf-silver)">CICERO</text>
    </g>

    <!-- Decorative thin line under text -->
    <g id="underline-decoration" opacity="0.4">
      <line x1="370" y1="862" x2="654" y2="862" stroke="#c0c7d0" stroke-width="1.5"/>
      <!-- Small diamond in the center -->
      <polygon points="512,856 518,862 512,868 506,862" fill="#c0c7d0"/>
    </g>

    <!-- Inner shadow overlay for depth -->
    <rect width="1024" height="1024" fill="url(#inner-shadow)" pointer-events="none"/>

  </g>
</svg>